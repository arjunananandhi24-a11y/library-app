<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Library Management System</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2196f3">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/29/29302.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            max-width: 600px; margin: 0 auto; padding: 15px;
            background: #f0f2f5; min-height: 100vh;
        }
        h1 { color: #333; text-align: center; margin: 20px 0; font-size: 22px; }
        .menu { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 15px; }
        button {
            width: 100%; padding: 16px; margin: 6px 0; background: #2196f3; color: white;
            border: none; border-radius: 10px; font-size: 16px; font-weight: 500;
            cursor: pointer; transition: all 0.2s; -webkit-tap-highlight-color: transparent;
        }
        button:active { background: #1976d2; transform: scale(0.98); }
        #bookList {
            background: white; padding: 15px; border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08); display: none; margin-bottom: 15px;
        }
        #bookList.show { display: block; }
        .book-item {
            padding: 12px; margin: 8px 0; background: #f5f5f5;
            border-radius: 8px; display: flex; flex-direction: column;
        }
        .book-item a { color: #2196f3; text-decoration: none; font-weight: 500; }
        .book-item a:active { color: #1976d2; }
        .available { color: #4caf50; font-weight: bold; }
        .issued { color: #f44336; font-weight: bold; }
        .download-btn {
            display: inline-block; background: #4caf50; color: white;
            padding: 8px 12px; border-radius: 6px; text-decoration: none;
            font-size: 14px; margin-top: 8px;
        }
        .input-area {
            background: white; padding: 15px; border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08); display: none; margin-bottom: 15px;
        }
        .input-area.show { display: block; }
        input[type="text"] {
            width: 100%; padding: 14px; border: 2px solid #e0e0e0;
            border-radius: 10px; font-size: 16px; margin-bottom: 10px;
        }
        input[type="text"]:focus { outline: none; border-color: #2196f3; }
        .btn-group { display: flex; gap: 10px; }
        .btn-group button { flex: 1; margin: 0; }
        .btn-cancel { background: #9e9e9e; }
        .message { padding: 12px; border-radius: 8px; margin-bottom: 10px; text-align: center; }
        .success { background: #e8f5e9; color: #2e7d32; }
        .error { background: #ffebee; color: #c62828; }
    </style>
</head>
<body>
    <a href="login.html" style="position:fixed;top:10px;right:10px;color:white;background:#e94560;padding:10px 20px;border-radius:20px;text-decoration:none;z-index:1000;font-size:14px;">🔐 Login</a>
    <h1>📚 Library Management System</h1>
    <div id="messageArea"></div>

    <div class="menu">
        <button onclick="showAddForm()">1. Add Book</button>
        <button onclick="viewBooks()">2. View All Books</button>
        <button onclick="showSearchForm()">3. Search Book</button>
        <button onclick="showIssueForm()">4. Issue Book</button>
        <button onclick="showReturnForm()">5. Return Book</button>
        <button onclick="exitApp()" style="background:#f44336;">6. Exit</button>
    </div>

    <div id="inputArea" class="input-area">
        <p id="inputLabel" style="margin-bottom:10px;font-weight:bold;"></p>
        <input type="text" id="bookInput" placeholder="Enter book name">
        <div class="btn-group">
            <button onclick="submitAction()" id="submitBtn">Submit</button>
            <button onclick="hideForm()" class="btn-cancel">Cancel</button>
        </div>
    </div>

    <div id="bookList"></div>

    <script>
        let books = [
            {name: "The Great Gatsby", issued: false, link: "https://www.gutenberg.org/ebooks/64317"},
            {name: "To Kill a Mockingbird", issued: false, link: "https://www.gutenberg.org"},
            {name: "1984", issued: false, link: "https://www.gutenberg.org"},
            {name: "Pride and Prejudice", issued: false, link: "https://www.gutenberg.org/ebooks/1342"},
            {name: "The Catcher in the Rye", issued: false, link: "https://www.gutenberg.org"},
            {name: "Harry Potter", issued: false, link: "https://www.gutenberg.org"},
            {name: "The Lord of the Rings", issued: false, link: "https://www.gutenberg.org"},
            {name: "The Alchemist", issued: false, link: "https://www.gutenberg.org"},
            {name: "Think and Grow Rich", issued: false, link: "https://www.gutenberg.org"},
            {name: "Rich Dad Poor Dad", issued: false, link: "https://www.gutenberg.org"}
        ];

        let currentAction = '';

        function showMessage(text, type) {
            const msgArea = document.getElementById('messageArea');
            msgArea.innerHTML = `<div class="message ${type}">${text}</div>`;
            setTimeout(() => msgArea.innerHTML = '', 3000);
        }

        function hideForm() {
            document.getElementById('inputArea').classList.remove('show');
            document.getElementById('bookInput').value = '';
        }

        function showAddForm() {
            currentAction = 'add';
            document.getElementById('inputLabel').textContent = 'Enter new book name:';
            document.getElementById('submitBtn').textContent = 'Add Book';
            document.getElementById('inputArea').classList.add('show');
            document.getElementById('bookList').classList.remove('show');
            document.getElementById('bookInput').focus();
        }

        function showSearchForm() {
            currentAction = 'search';
            document.getElementById('inputLabel').textContent = 'Enter book name to search:';
            document.getElementById('submitBtn').textContent = 'Search';
            document.getElementById('inputArea').classList.add('show');
            document.getElementById('bookList').classList.remove('show');
            document.getElementById('bookInput').focus();
        }

        function showIssueForm() {
            currentAction = 'issue';
            document.getElementById('inputLabel').textContent = 'Enter book name to issue:';
            document.getElementById('submitBtn').textContent = 'Issue Book';
            document.getElementById('inputArea').classList.add('show');
            document.getElementById('bookList').classList.remove('show');
            document.getElementById('bookInput').focus();
        }

        function showReturnForm() {
            currentAction = 'return';
            document.getElementById('inputLabel').textContent = 'Enter book name to return:';
            document.getElementById('submitBtn').textContent = 'Return Book';
            document.getElementById('inputArea').classList.add('show');
            document.getElementById('bookList').classList.remove('show');
            document.getElementById('bookInput').focus();
        }

        function getBookUrl(name) {
            return name.toLowerCase().replace(/[^a-z0-9]/g, '-');
        }

        function submitAction() {
            const name = document.getElementById('bookInput').value.trim();
            if (!name) {
                showMessage('Please enter a book name!', 'error');
                return;
            }

            if (currentAction === 'add') {
                books.push({name: name, issued: false, link: "https://www.gutenberg.org"});
                showMessage('✅ Book added: ' + name, 'success');
                hideForm();
                viewBooks();
            } 
            else if (currentAction === 'search') {
                const found = books.find(b => b.name.toLowerCase() === name.toLowerCase());
                if (found) {
                    const status = found.issued ? '🔴 Issued' : '🟢 Available';
                    showMessage('🔍 Found: ' + found.name + ' - ' + status, 'success');
                } else {
                    showMessage('❌ Book not found.', 'error');
                }
                hideForm();
            }
            else if (currentAction === 'issue') {
                const book = books.find(b => b.name.toLowerCase() === name.toLowerCase());
                if (book && !book.issued) {
                    book.issued = true;
                    showMessage('📤 Issued: ' + book.name, 'success');
                    viewBooks();
                } else if (book && book.issued) {
                    showMessage('⚠️ Already issued.', 'error');
                } else {
                    showMessage('❌ Book not found.', 'error');
                }
                hideForm();
            }
            else if (currentAction === 'return') {
                const book = books.find(b => b.name.toLowerCase() === name.toLowerCase());
                if (book && book.issued) {
                    book.issued = false;
                    showMessage('📥 Returned: ' + book.name, 'success');
                    viewBooks();
                } else {
                    showMessage('❌ Not found or not issued.', 'error');
                }
                hideForm();
            }
        }

        function viewBooks() {
            hideForm();
            const bookList = document.getElementById('bookList');
            
            if (books.length === 0) {
                bookList.innerHTML = '<p style="text-align:center;color:#666;">📭 No books in library.</p>';
                bookList.classList.add('show');
                return;
            }

            let html = '<h3 style="margin-bottom:12px;">📚 All Books</h3>';
            books.forEach((b, i) => {
                const status = b.issued ? 
                    '<span class="issued">🔴 Issued</span>' : 
                    '<span class="available">🟢 Available</span>';
                
                html += `<div class="book-item">
                    <div style="display:flex;justify-content:space-between;width:100%;margin-bottom:4px;">
                        <span>${i+1}. <a href="books/${getBookUrl(b.name)}.html">${b.name}</a></span>
                        ${status}
                    </div>
                    <a href="${b.link}" target="_blank" class="download-btn">⬇️ Download / Read</a>
                </div>`;
            });
            
            bookList.innerHTML = html;
            bookList.classList.add('show');
        }

        function exitApp() {
            document.body.innerHTML = '<h1 style="text-align:center;margin-top:100px;color:#666;">👋 Thank you for using<br>Library Management System!</h1>';
        }

        document.getElementById('bookInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') submitAction();
        });
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(function(registration) {
                    console.log('Service Worker registered');
                })
                .catch(function(error) {
                    console.log('Service Worker registration failed');
                });
        }
    </script>
</body>
</html>
